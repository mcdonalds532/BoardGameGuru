[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = [
  "python3.11 -m venv --copies /opt/venv",
  ". /opt/venv/bin/activate && pip install -r backend/requirements.txt"
]

[start]
cmd = ". /opt/venv/bin/activate && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT --app-dir backend"
